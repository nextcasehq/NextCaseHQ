name: NextCaseHQ - Governance & Validation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Full Sentinel Governance & Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-id: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.30.3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Build Application
        run: pnpm run build

      - name: Setup Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install --with-deps chromium

      - name: Run Playwright Tests & Sentinel Framework
        run: |
          node sentinels/release-sentinel/run.js

      - name: Run Business Execution & Verification Sentinel (BEVS)
        run: |
          node sentinels/bevs-sentinel/run.js

      - name: Upload Sentinel Execution Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextcasehq-sentinel-reports-${{ github.sha }}
          path: reports/
          retention-days: 14
